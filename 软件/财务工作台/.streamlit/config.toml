[server]
address = "0.0.0.0"
port = 8502
enableCORS = true
enableXsrfProtection = true
headless = true
maxUploadSize = 200
maxMessageSize = 200

[browser]
gatherUsageStats = false

[theme]
primaryColor = "#4CAF50"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F0F2F6"
textColor = "#262730"
font = "sans serif"

[runner]
# 启用魔术命令缓存
magicEnabled = true

# 启用快速重运行
fastReruns = true
